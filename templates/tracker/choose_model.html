{% extends 'base.html' %}
{% load static %}

{% block content %}

<h1>Choose a 3D Model</h1>
    <form method="post">
        {% csrf_token %}
        <label for="model_id">Select a Model:</label>
        <select name="model_id" id="model_id">
            {% for model in models %}
                <option value="{{ model.id }}">{{ model.name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Display Model</button>
    </form>

{% endblock content %}
